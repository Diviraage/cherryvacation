
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif}
.wrap{background:#FDF8F4;padding:1rem}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;border:1.5px solid #d4a0a0;background:#fff;color:#8B1A1A;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.tab.active{background:#8B1A1A;color:#fff;border-color:#8B1A1A}
.floor-wrap{position:relative;width:100%}
.floor-svg{width:100%;height:auto;display:block}
.room{cursor:default;transition:opacity .15s}
.room.has-event{cursor:pointer}
.room.has-event:hover rect,.room.has-event:hover polygon,.room.has-event:hover path{opacity:.75}
.modal-bg{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(60,10,10,.45);border-radius:8px;z-index:10;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.25rem;max-width:340px;width:90%;position:relative}
.modal-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;color:#8B1A1A;line-height:1}
.modal-badge{display:inline-block;background:#FDF0F0;color:#8B1A1A;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:8px;border:1px solid #f0d4d4}
.modal-title{font-size:15px;font-weight:500;color:#3d2020;line-height:1.4;margin-bottom:10px}
.modal-experts{font-size:13px;color:#6b3a3a;margin-bottom:8px}
.modal-shelter{font-size:12px;color:#b06060;border-top:0.5px solid #f0d4d4;padding-top:8px;margin-top:4px}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:#6b3a3a}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0}
</style>

function showFloor(id) {
  ["f1","f2","f3","sh"].forEach(f => {
    document.getElementById(f).style.display = f===id ? "block" : "none";
  });
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["f1","f2","f3","sh"][i]===id);
  });
}

function openModal(floor, roomId) {
  const d = data[roomId];
  if (!d) return;
  document.getElementById("mb-"+floor).textContent = d.line + " · " + d.time;
  document.getElementById("mt-"+floor).textContent = d.title;
  document.getElementById("me-"+floor).textContent = d.experts.join(", ");
  document.getElementById("ms-"+floor).textContent = "Укриття: " + d.shelter;
  document.getElementById("modal-"+floor).classList.add("open");
}

function closeModal(floor) {
  document.getElementById("modal-"+floor).classList.remove("open");
}
